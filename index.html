<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hinglish Chat Bot</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #dfe5e7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ── Chat container ── */
    .chat-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 750px;
      display: flex;
      flex-direction: column;
      background-color: #ece5dd;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }

    /* ── Header ── */
    .chat-header {
      background-color: #075e54;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background-color: #25d366;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .header-info p {
      font-size: 12px;
      color: #b2dfdb;
      margin-top: 1px;
    }

    /* ── Messages area ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8c8c8' fill-opacity='0.18'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background-color: rgba(0,0,0,0.2);
      border-radius: 4px;
    }

    /* ── Message bubbles ── */
    .message {
      max-width: 72%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      position: relative;
      word-break: break-word;
      animation: popIn 0.2s ease-out;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(4px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    /* User message — right, green */
    .message.user {
      align-self: flex-end;
      background-color: #dcf8c6;
      border-radius: 8px 2px 8px 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }

    /* Bot message — left, white */
    .message.bot {
      align-self: flex-start;
      background-color: #ffffff;
      border-radius: 2px 8px 8px 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.12);
    }

    .message .timestamp {
      display: block;
      font-size: 10px;
      color: #9e9e9e;
      text-align: right;
      margin-top: 4px;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      align-self: flex-start;
      background-color: #ffffff;
      border-radius: 2px 8px 8px 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.12);
      padding: 10px 14px;
      display: none;
      gap: 4px;
      align-items: center;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background-color: #90a4ae;
      border-radius: 50%;
      animation: bounce 1s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    .chat-input-area {
      background-color: #f0f0f0;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .chat-input-area input {
      flex: 1;
      border: none;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      background-color: #ffffff;
      outline: none;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      transition: box-shadow 0.2s;
    }

    .chat-input-area input:focus {
      box-shadow: 0 0 0 2px #25d36640;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background-color: #25d366;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background-color 0.2s, transform 0.1s;
    }

    .send-btn:hover  { background-color: #1ebe5d; }
    .send-btn:active { transform: scale(0.92); }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    /* ── Responsive: full screen on very small viewports ── */
    @media (max-width: 480px) {
      body { align-items: stretch; }
      .chat-container {
        max-width: 100%;
        max-height: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
      <div class="header-avatar">🤖</div>
      <div class="header-info">
        <h1>Hinglish Chat Bot</h1>
        <p id="status-text">Online</p>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
      <!-- Initial bot greeting -->
      <div class="message bot">
        Namaste! 👋 Main aapka Hinglish Chat Bot hoon. Kuch bhi poochho!
        <span class="timestamp" id="greeting-time"></span>
      </div>

      <!-- Typing indicator (hidden by default) -->
      <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Input area -->
    <div class="chat-input-area">
      <input
        type="text"
        id="messageInput"
        placeholder="Type a message..."
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn" aria-label="Send message">
        <!-- Paper-plane icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // ── DOM refs ──
    const chatMessages   = document.getElementById('chatMessages');
    const messageInput   = document.getElementById('messageInput');
    const sendBtn        = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const statusText     = document.getElementById('status-text');

    // Set greeting timestamp
    document.getElementById('greeting-time').textContent = getTime();

    // ── Bot reply pool ──
    const botReplies = [
      'Bilkul sahi kaha aapne! 😄',
      'Haan ji, main samajh gaya!',
      'Wah! Bahut badhiya baat hai yeh.',
      'Interesting! Aur batao? 🤔',
      'Theek hai, main note kar leta hoon.',
      'Arre yaar, yeh toh mujhe pata hi nahi tha!',
      'Hmm… thoda aur detail mein batao?',
      'Ha ha, aap toh bahut funny hain! 😂',
      'Samajh gaya main. Kuch aur poochna hai?',
      'Bilkul! Main AI hun, lekin dil se jawab deta hoon. 🤖❤️',
    ];

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    function scrollToBottom() {
      chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
    }

    function appendMessage(text, sender) {
      // Move typing indicator out of the way before inserting
      const msg = document.createElement('div');
      msg.classList.add('message', sender);

      const textNode = document.createTextNode(text);
      msg.appendChild(textNode);

      const ts = document.createElement('span');
      ts.classList.add('timestamp');
      ts.textContent = getTime();
      msg.appendChild(ts);

      chatMessages.insertBefore(msg, typingIndicator);
      scrollToBottom();
    }

    function showTyping() {
      typingIndicator.classList.add('visible');
      statusText.textContent = 'typing…';
      scrollToBottom();
    }

    function hideTyping() {
      typingIndicator.classList.remove('visible');
      statusText.textContent = 'Online';
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      // Show user message
      appendMessage(text, 'user');
      messageInput.value = '';
      messageInput.focus();

      // Show typing indicator
      showTyping();

      // Simulate bot reply after 1 second
      setTimeout(() => {
        hideTyping();
        const reply = botReplies[Math.floor(Math.random() * botReplies.length)];
        appendMessage(reply, 'bot');
      }, 1000);
    }

    // ── Event listeners ──
    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
